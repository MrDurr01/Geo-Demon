<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Demons</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #ff5e5e; text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .demon-entry { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #333; transition: background 0.2s; }
        .demon-entry:hover { background: #2a2a2a; }
        .rank { font-weight: bold; color: #ffcc00; width: 50px; font-size: 1.2em; }
        .info { flex-grow: 1; }
        .name { font-size: 1.1em; font-weight: 600; }
        .creator { font-size: 0.85em; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h1>Geo-Demon</h1>
    <div id="list">Loading the latest demon data...</div>
</div>

<script>
    async function loadDemonList() {
        const listDiv = document.getElementById('list');
        try {
            // Fetching from Pointercrate's official API
            const response = await fetch('https://pointercrate.com/api/v2/demons/listed?limit=20');
            const data = await response.json();
            
            listDiv.innerHTML = ''; 

            data.forEach(demon => {
                const entry = document.createElement('div');
                entry.className = 'demon-entry';
                entry.innerHTML = `
                    <div class="rank">#${demon.position}</div>
                    <div class="info">
                        <div class="name">${demon.name}</div>
                        <div class="creator">Verified by ${demon.verifier}</div>
                    </div>
                `;
                listDiv.appendChild(entry);
            });
        } catch (error) {
            listDiv.innerHTML = '<p style="color:red; text-align:center;">Failed to connect to the demon list API.</p>';
        }
    }

    loadDemonList();
</script>

</body>
</html>
