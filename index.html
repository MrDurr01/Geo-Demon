<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geo Demons</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        h1 { color: #ff4757; text-align: center; }
        .demon { padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Geo-Demon</h1>
    <div id="list">Loading...</div>
</div>

<script>
    async function loadList() {
        const listDiv = document.getElementById('list');
        try {
            // Using the primary Pointercrate API endpoint
            const response = await fetch('https://pointercrate.com/api/v2/demons/listed?limit=10', {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            listDiv.innerHTML = data.map(d => `
                <div class="demon">
                    <strong>#${d.position} ${d.name}</strong><br>
                    <small>Verified by: ${d.verifier}</small>
                </div>
            `).join('');
        } catch (e) {
            listDiv.innerHTML = 'Error: ' + e.message + '<br>Check your browser console (F12) for more details.';
        }
    }
    loadList();
</script>

</body>
</html>
