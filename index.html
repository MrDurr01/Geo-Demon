<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Demons</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 10px; }
        h1 { color: #ff4757; text-align: center; }
        .demon { padding: 15px; border-bottom: 1px solid #333; }
        .rank { color: #ffa502; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Geo-Demon</h1>
    <div id="list">Loading...</div>
</div>

<script>
    async function loadDemonList() {
        const listDiv = document.getElementById('list');
        // We use allorigins.win to bypass CORS restrictions
        const apiUrl = 'https://pointercrate.com/api/v2/demons/listed?limit=20';
        const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(apiUrl);

        try {
            const response = await fetch(proxyUrl);
            const json = await response.json();
            const data = JSON.parse(json.contents);
            
            listDiv.innerHTML = data.map(d => `
                <div class="demon">
                    <span class="rank">#${d.position}</span> <strong>${d.name}</strong><br>
                    <small>Verified by: ${d.verifier}</small>
                </div>
            `).join('');
        } catch (e) {
            listDiv.innerHTML = 'Error loading data: ' + e.message;
        }
    }
    loadDemonList();
</script>

</body>
</html>
