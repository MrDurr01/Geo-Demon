<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geo-Demon List</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #2d2d2d; padding: 20px; border-radius: 8px; }
        h1 { color: #ff4757; text-align: center; }
        .demon-card { border-bottom: 1px solid #444; padding: 10px 0; }
        .rank { font-weight: bold; color: #ffa502; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Geo-Demon</h1>
    <div id="demon-list">Loading top demons...</div>
</div>

<script>
    async function fetchDemons() {
        try {
            // Pointercrate API endpoint for listed demons
            const response = await fetch('https://pointercrate.com/api/v2/demons/listed?limit=10');
            const demons = await response.json();
            
            const listDiv = document.getElementById('demon-list');
            listDiv.innerHTML = ''; // Clear loading text

            demons.forEach(demon => {
                const div = document.createElement('div');
                div.className = 'demon-card';
                div.innerHTML = `
                    <span class="rank">#${demon.position}</span> 
                    <strong>${demon.name}</strong> - Creator: ${demon.creator}
                `;
                listDiv.appendChild(div);
            });
        } catch (error) {
            document.getElementById('demon-list').innerHTML = 'Failed to load data. Please check your connection.';
        }
    }

    fetchDemons();
</script>

</body>
</html>
